name: SBOM

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel
  schedule:
    - cron: "41 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source:
    name: Generate source SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOMs
        run: |
          set -euo pipefail
          mkdir -p sbom
          "${{ steps.syft.outputs.cmd }}" dir:. \
            --source-name simple-alert-proxy \
            --source-version "${GITHUB_SHA}" \
            -o spdx-json=sbom/simple-alert-proxy.source.spdx.json \
            -o cyclonedx-json=sbom/simple-alert-proxy.source.cyclonedx.json
          test -s sbom/simple-alert-proxy.source.spdx.json
          test -s sbom/simple-alert-proxy.source.cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: simple-alert-proxy-source-sbom
          path: sbom/
          if-no-files-found: error
