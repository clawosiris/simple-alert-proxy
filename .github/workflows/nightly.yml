name: Nightly

on:
  schedule:
    - cron: "19 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

  container:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Resolve image metadata
        id: image
        run: |
          set -euo pipefail
          image="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          date_tag="$(date -u +%Y%m%d)"
          short_sha="${GITHUB_SHA::12}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "date_tag=${date_tag}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Build nightly container image
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          date_tag="${{ steps.image.outputs.date_tag }}"
          short_sha="${{ steps.image.outputs.short_sha }}"
          sudo podman build \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=nightly" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${image}:nightly" \
            -t "${image}:nightly-${date_tag}" \
            -t "${image}:nightly-${short_sha}" \
            .

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push nightly container image
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          date_tag="${{ steps.image.outputs.date_tag }}"
          short_sha="${{ steps.image.outputs.short_sha }}"
          sudo podman push "${image}:nightly"
          sudo podman push "${image}:nightly-${date_tag}"
          sudo podman push "${image}:nightly-${short_sha}"
