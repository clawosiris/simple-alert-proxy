name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release artifact
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="simple-alert-proxy-${version}-linux-x86_64"
          mkdir -p "dist/${asset}"
          cp target/release/simple-alert-proxy "dist/${asset}/"
          cp README.md LICENSE "dist/${asset}/"
          tar -C dist -czf "${asset}.tar.gz" "${asset}"
          sha256sum "${asset}.tar.gz" > "${asset}.tar.gz.sha256"

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate source SBOMs
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="simple-alert-proxy-${version}"
          "${{ steps.syft.outputs.cmd }}" dir:. \
            --source-name simple-alert-proxy \
            --source-version "${version}" \
            -o spdx-json="${asset}.source.spdx.json" \
            -o cyclonedx-json="${asset}.source.cyclonedx.json"
          sha256sum "${asset}.source.spdx.json" > "${asset}.source.spdx.json.sha256"
          sha256sum "${asset}.source.cyclonedx.json" > "${asset}.source.cyclonedx.json.sha256"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push container image
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          image="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          sudo podman build \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${version}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${image}:${version}" \
            -t "${image}:latest" \
            .
          sudo podman push "${image}:${version}"
          sudo podman push "${image}:latest"

      - name: Generate container image SBOMs
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="simple-alert-proxy-${version}"
          image="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          sudo podman save "${image}:${version}" -o "${asset}.container.tar"
          "${{ steps.syft.outputs.cmd }}" "docker-archive:${asset}.container.tar" \
            --source-name "${image}" \
            --source-version "${version}" \
            -o spdx-json="${asset}.container.spdx.json" \
            -o cyclonedx-json="${asset}.container.cyclonedx.json"
          rm "${asset}.container.tar"
          sha256sum "${asset}.container.spdx.json" > "${asset}.container.spdx.json.sha256"
          sha256sum "${asset}.container.cyclonedx.json" > "${asset}.container.cyclonedx.json.sha256"

      - name: Create release notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          image="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          cat > release-notes.md <<EOF
          ## Container Images

          \`\`\`bash
          podman pull ${image}:${version}
          podman pull ${image}:latest
          \`\`\`

          ## Binary Asset

          This release includes a Linux x86_64 binary tarball and SHA-256 checksum.

          ## SBOMs

          This release includes SPDX JSON and CycloneDX JSON SBOMs for the source tree
          and container image, plus SHA-256 checksums for each SBOM.
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            simple-alert-proxy-*.tar.gz \
            simple-alert-proxy-*.tar.gz.sha256 \
            simple-alert-proxy-*.spdx.json \
            simple-alert-proxy-*.spdx.json.sha256 \
            simple-alert-proxy-*.cyclonedx.json \
            simple-alert-proxy-*.cyclonedx.json.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
