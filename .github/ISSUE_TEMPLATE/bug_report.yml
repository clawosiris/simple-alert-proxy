name: Bug report
description: Report a reproducible problem in simple-alert-proxy
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        For security problems, do not file a public issue. Use the process in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include config snippets or sample payloads if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, container/runtime details, and release or commit.
