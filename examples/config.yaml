server:
  bind: "127.0.0.1:8080"
  webhook_path: "/webhooks/signoz"
  max_body_bytes: 1048576
  auth:
    bearer_token: "replace-me"
  # tls:
  #   cert_env: "SIMPLE_ALERT_PROXY_TLS_CERT_PEM"
  #   key_env: "SIMPLE_ALERT_PROXY_TLS_KEY_PEM"

debug:
  log_alerts: false

routing:
  default_receiver: "default-chat"
  routes:
    - name: "critical-production"
      receiver: "critical-chat"
      matchers:
        - field: "label.severity"
          equals: "critical"
        - field: "label.environment"
          regex: "prod|production"

    - name: "database-alerts"
      receiver: "database-chat"
      continue_matching: true
      matchers:
        - field: "label.service"
          contains: "postgres"

receivers:
  default-chat:
    type: "google_chat"
    webhook_url: "https://chat.googleapis.com/v1/spaces/example/messages?key=example&token=example"
    title_template: "[{{status}}] {{alertname}}"
    timeout_secs: 10

  critical-chat:
    type: "google_chat"
    webhook_url: "https://chat.googleapis.com/v1/spaces/critical/messages?key=example&token=example"
    title_template: "CRITICAL {{alertname}}"
    timeout_secs: 10

  database-chat:
    type: "google_chat"
    webhook_url: "https://chat.googleapis.com/v1/spaces/database/messages?key=example&token=example"
    title_template: "DB {{alertname}}"
    timeout_secs: 10
